<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Шахова дошка</title>
    <style>
        table {
            border-collapse: collapse;
            margin: 20px;
        }

        td {
            width: 60px;
            height: 60px;
            text-align: center;
            vertical-align: middle;
            font-size: 30px;
        }

        .black {
            background-color: gray;
        }

        .white {
            background-color: white;
        }

        .label {
            font-weight: bold;
        }
    </style>
</head>
<body>

        <td class="label">G</td>
